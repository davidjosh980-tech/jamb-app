<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  color: #e2e8f0;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  animation: fade 0.5s ease;
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

.form-control, .form-select {
  background: #0f172a;
  border: 1px solid #334155;
  color: white;
  margin-bottom: 15px;
}

.btn-custom {
  background: #38bdf8;
  border: none;
  border-radius: 10px;
  padding: 12px;
  width: 100%;
  font-weight: 600;
  transition: 0.3s;
}

.btn-custom:hover {
  background: #0ea5e9;
}
</style>
</head>
<body>

<div class="card">
  <h3>Student Details</h3>
  <input type="number" class="form-control" id="reg" placeholder="REGISTRATION NUMBER">
  <input type="text" class="form-control" id="course" placeholder="CHOICE OF COURSE">
  <input type="text" class="form-control" id="uni" placeholder="FIRST CHOICE OF UNIVERSITY">

  <p class="text-start text-success">Courses Selected</p>
  <select id="course1" class="form-select">
    <option>First Course</option>
    <option>Maths</option>
    <option>English language studies</option>
    <option>Biology</option>
    <option>Computer studies</option>
    <option>Physics</option>
    <option>Chemistry</option>
  </select>
  <select id="course2" class="form-select">
    <option>Second Course</option>
    <option>Maths</option>
    <option>English language studies</option>
    <option>Biology</option>
    <option>Computer studies</option>
    <option>Physics</option>
    <option>Chemistry</option>
  </select>
  <select id="course3" class="form-select">
    <option>Third Course</option>
    <option>Maths</option>
    <option>English language studies</option>
    <option>Biology</option>
    <option>Computer studies</option>
    <option>Physics</option>
    <option>Chemistry</option>
  </select>
  <select id="course4" class="form-select">
    <option>Fourth Course</option>
    <option>Maths</option>
    <option>English language studies</option>
    <option>Biology</option>
    <option>Computer studies</option>
    <option>Physics</option>
    <option>Chemistry</option>
  </select>

  <button id="submit" class="btn btn-custom mt-3">Sign-up</button>
</div>

<script>
document.getElementById('submit').addEventListener('click', () => {
  const data = {
    reg: document.getElementById('reg').value,
    course: document.getElementById('course').value,
    uni: document.getElementById('uni').value,
    selectedCourses: [
      document.getElementById('course1').value,
      document.getElementById('course2').value,
      document.getElementById('course3').value,
      document.getElementById('course4').value
    ]
  };

  // Save to localStorage
  localStorage.setItem('student', JSON.stringify(data));
  alert('Student details saved!');

  // Redirect after saving
  window.location.href = '../boostrap1/boostrap1.html';
});
</script>

</body>
</html>
