<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Step Signup SPA</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-family:sans-serif;
}
.card {
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  width:100%;
  max-width:500px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  min-height:400px;
}
.hidden { display:none; }
.fade { animation: fade 0.4s ease; }
@keyframes fade {
  from {opacity:0; transform:translateX(20px);} 
  to {opacity:1; transform:translateX(0);} 
}
.form-control, .form-select { background:#0f172a; border:1px solid #334155; color:white; margin-bottom:10px; }
.btn-custom { background:#38bdf8; border:none; color:black; font-weight:600; padding:10px; width:100%; border-radius:10px; margin-top:5px;}
.tag { background:#38bdf8; color:black; padding:5px 10px; border-radius:20px; margin:3px;}
</style>
</head>
<body>

<div class="card">

  <!-- STEP 1: Name -->
  <div id="step1">
    <h3>Your Name</h3>
    <input class="form-control" id="first" placeholder="First Name">
    <input class="form-control" id="last" placeholder="Last Name">
    <input class="form-control" id="middle" placeholder="Middle Name (optional)">
    <button class="btn btn-custom" onclick="next(2)">Continue</button>
  </div>

  <!-- STEP 2: Email -->
  <div id="step2" class="hidden">
    <h3>Email</h3>
    <input class="form-control" id="email" placeholder="Email">
    <button class="btn btn-custom" onclick="next(3)">Continue</button>
  </div>

  <!-- STEP 3: Password -->
  <div id="step3" class="hidden">
    <h3>Password</h3>
    <input type="password" class="form-control" id="password" placeholder="Password">
    <button class="btn btn-custom" onclick="next(4)">Continue</button>
  </div>

  <!-- STEP 4: Student Details -->
  <div id="step4" class="hidden">
    <h3>Student Details</h3>
    <input type="number" class="form-control" id="reg" placeholder="Registration Number">
    <input type="text" class="form-control" id="course" placeholder="Choice of Course">
    <input type="text" class="form-control" id="uni" placeholder="First Choice University">
    
    <p class="text-start text-success">Courses Selected</p>
    <select id="course1" class="form-select">
      <option>First Course</option><option>Maths</option><option>English</option><option>Biology</option>
      <option>Computer Studies</option><option>Physics</option><option>Chemistry</option>
    </select>
    <select id="course2" class="form-select">
      <option>Second Course</option><option>Maths</option><option>English</option><option>Biology</option>
      <option>Computer Studies</option><option>Physics</option><option>Chemistry</option>
    </select>
    <select id="course3" class="form-select">
      <option>Third Course</option><option>Maths</option><option>English</option><option>Biology</option>
      <option>Computer Studies</option><option>Physics</option><option>Chemistry</option>
    </select>
    <select id="course4" class="form-select">
      <option>Fourth Course</option><option>Maths</option><option>English</option><option>Biology</option>
      <option>Computer Studies</option><option>Physics</option><option>Chemistry</option>
    </select>
    <button class="btn btn-custom" onclick="finish()">Finish</button>
  </div>

  <!-- STEP 5: Profile -->
  <div id="profile" class="hidden">
    <h3>Welcome <span id="nameDisplay"></span></h3>
    <p id="emailDisplay"></p>
    <hr>
    <p><b>Registration Number:</b> <span id="regDisplay"></span></p>
    <p><b>Course:</b> <span id="courseDisplay"></span></p>
    <p><b>University:</b> <span id="uniDisplay"></span></p>
    <p><b>Selected Subjects:</b></p>
    <span class="tag" id="sub1"></span>
    <span class="tag" id="sub2"></span>
    <span class="tag" id="sub3"></span>
    <span class="tag" id="sub4"></span>
  </div>

</div>

<script>
function next(step){
  document.querySelectorAll('.card > div').forEach(div=>{
    div.classList.add('hidden');
    div.classList.remove('fade');
  });
  const nextStep = document.getElementById('step'+step);
  nextStep.classList.remove('hidden');
  nextStep.classList.add('fade');
}

function finish(){
  const data = {
    first: document.getElementById('first').value,
    last: document.getElementById('last').value,
    middle: document.getElementById('middle').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    reg: document.getElementById('reg').value,
    course: document.getElementById('course').value,
    uni: document.getElementById('uni').value,
    selectedCourses: [
      document.getElementById('course1').value,
      document.getElementById('course2').value,
      document.getElementById('course3').value,
      document.getElementById('course4').value
    ]
  };
  localStorage.setItem('user', JSON.stringify(data));
  showProfile();
}

function showProfile(){
  const user = JSON.parse(localStorage.getItem('user'));
  document.querySelectorAll('.card > div').forEach(div=>{
    div.classList.add('hidden');
    div.classList.remove('fade');
  });
  const profile = document.getElementById('profile');
  profile.classList.remove('hidden');
  profile.classList.add('fade');
  
  document.getElementById('nameDisplay').innerText = user.first + ' ' + user.middle + ' ' + user.last;
  document.getElementById('emailDisplay').innerText = user.email;
  document.getElementById('regDisplay').innerText = user.reg;
  document.getElementById('courseDisplay').innerText = user.course;
  document.getElementById('uniDisplay').innerText = user.uni;
  document.getElementById('sub1').innerText = user.selectedCourses[0];
  document.getElementById('sub2').innerText = user.selectedCourses[1];
  document.getElementById('sub3').innerText = user.selectedCourses[2];
  document.getElementById('sub4').innerText = user.selectedCourses[3];
}

// Auto-load if user exists
window.onload = () => {
  if(localStorage.getItem('user')){
    showProfile();
  }
}
</script>

</body>
</html>
