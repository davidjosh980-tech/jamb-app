<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border: none;
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 80px;
      margin: 8px 104px;
      margin-bottom: 15px;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
    }

    .form-control:focus {
      border-color: #38bdf8;
      box-shadow: none;
    }

    .btn-custom {
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      background: #38bdf8;
      border: none;
      transition: 0.3s;
    }

    .btn-custom:hover {
      background: #0ea5e9;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- LOGO -->
    <img src="image.png" width="180" height="60" class="logo" alt="logo">

    <!-- TITLE -->
    <h3 class="text-primary">Create Account</h3>
    <p class="subtitle">Enter your email to get started</p>

    <!-- INPUT -->
    <input type="email" id="email" class="form-control mb-3" placeholder="Enter your email">

    <!-- BUTTON -->
    <button class="btn btn-custom w-100" id="submit">Continue</button>

  </div>

  <script src="logpage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
